# ============================================================================
# Job: Apply DB schema + seed templates to the Olares-provided Postgres.
#
# Runs once per `helm install` / `helm upgrade`. Migrations are written with
# `CREATE TABLE IF NOT EXISTS` and seed entries use `ON CONFLICT DO NOTHING`,
# so re-running is a no-op once tables exist.
#
# Uses a slim postgres client image (psql) rather than the backend image so
# we don't have to rebuild backend on schema-only changes.
# ============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: insilo-migrate-r{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: migrations
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: insilo
        component: migrations
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "{{ .Values.postgres.host }}"
            - name: PGPORT
              value: "{{ .Values.postgres.port }}"
            - name: PGUSER
              value: "{{ .Values.postgres.username }}"
            - name: PGPASSWORD
              value: "{{ .Values.postgres.password }}"
            - name: PGDATABASE
              value: "{{ .Values.postgres.databases.insilo }}"
          command:
            - sh
            - -c
            - |
              set -eu
              echo "Waiting for Postgres at $PGHOST:$PGPORT..."
              for i in $(seq 1 30); do
                if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" >/dev/null 2>&1; then
                  echo "Postgres ready."
                  break
                fi
                sleep 2
              done
              for f in /sql/0001_initial_schema.sql /sql/0002_rls_policies.sql /sql/0003_org_settings.sql /sql/0099_seed.sql; do
                echo "Applying $f..."
                psql -v ON_ERROR_STOP=1 -f "$f"
              done
              echo "Migrations complete."
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
      volumes:
        - name: sql
          configMap:
            name: insilo-migrations
