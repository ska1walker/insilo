# ============================================================================
# Deployment: Insilo Embeddings Service (BGE-M3)
#
# Generiert 1024-dim Embeddings für semantische Suche.
# CPU-only ist OK, GPU optional.
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: insilo-embeddings
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: embeddings
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insilo
      component: embeddings
  template:
    metadata:
      labels:
        app: insilo
        component: embeddings
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: embeddings
          image: "{{ .Values.images.embeddings.repository }}:{{ .Values.images.embeddings.tag }}"
          imagePullPolicy: {{ .Values.images.embeddings.pullPolicy }}
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: EMBEDDINGS_MODEL
              value: "{{ .Values.models.embeddings }}"
            - name: MODELS_DIR
              value: "/app/cache/models"

          volumeMounts:
            - name: app-cache
              mountPath: /app/cache

          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi

          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: app-cache
          hostPath:
            path: {{ .Values.userspace.appCache }}
            type: DirectoryOrCreate
