# ============================================================================
# Deployment: Insilo Whisper Service
#
# faster-whisper + pyannote.audio für Transkription + Speaker Diarization.
# Braucht 1 NVIDIA GPU (~3 GB VRAM).
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: insilo-whisper
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: whisper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insilo
      component: whisper
  template:
    metadata:
      labels:
        app: insilo
        component: whisper
    spec:
      initContainers:
        # See deployment-worker.yaml for why this is needed.
        - name: init-chown
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 1000:1000 /app/cache']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-cache
              mountPath: /app/cache
      containers:
        - name: whisper
          image: "{{ .Values.images.whisper.repository }}:{{ .Values.images.whisper.tag }}"
          imagePullPolicy: {{ .Values.images.whisper.pullPolicy }}
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: WHISPER_MODEL
              value: "{{ .Values.models.whisper }}"
            # CPU on Olares for now — the GPU on the box is already
            # claimed by other apps (Open WebUI, Qwen Vision). int8
            # is the speed/accuracy sweet spot on CPU.
            - name: WHISPER_DEVICE
              value: "cpu"
            - name: WHISPER_COMPUTE_TYPE
              value: "int8"
            - name: MODELS_DIR
              value: "/app/cache/models"
            # Decoder beam search width — see services/whisper/app/main.py
            # Settings.beam_size. NOTE: pydantic-settings has no env_prefix
            # configured, so the field name `beam_size` maps to the plain
            # env var `BEAM_SIZE` (uppercased). The WHISPER_* vars above
            # follow the OlaresManifest naming convention but are nominal —
            # the running service uses the pydantic defaults for those.
            # Defensive: `helm upgrade --reuse-values` against an older
            # install can leave `.Values.whisper` as nil — use (...) to
            # tolerate missing parent map.
            #
            # v0.1.52+: env_prefix="WHISPER_" greift jetzt in Settings,
            # daher mit dem prefix (vorher BEAM_SIZE ohne prefix als
            # Workaround für fehlenden env_prefix).
            - name: WHISPER_BEAM_SIZE
              value: "{{ (.Values.whisper).beamSize | default 5 }}"

          volumeMounts:
            - name: app-cache
              mountPath: /app/cache

          # CPU-only. Bumps cpu request a bit because Whisper benefits
          # from threads when not on GPU. No GPU slot reservation.
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
            limits:
              cpu: 6000m
              memory: 8Gi

          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60      # Modell-Load braucht Zeit
            periodSeconds: 10

      volumes:
        - name: app-cache
          hostPath:
            path: {{ .Values.userspace.appCache }}
            type: DirectoryOrCreate
