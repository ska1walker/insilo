# ============================================================================
# Services für Insilo
#
# Wichtig (Olares-Linter):
# - type: ClusterIP IMMER — NodePort und LoadBalancer sind verboten
# - Service-Name MUSS dem Entrance.host im OlaresManifest entsprechen
# - metadata.name MUSS literal sein
# ============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: insilo                  # MUSS entrance[0].host matchen (Marc's Gold-Standard-Regel)
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: insilo
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: insilo-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: backend
spec:
  type: ClusterIP
  selector:
    app: insilo
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: insilo-whisper
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: whisper
spec:
  type: ClusterIP
  selector:
    app: insilo
    component: whisper
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: insilo-embeddings
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: embeddings
spec:
  type: ClusterIP
  selector:
    app: insilo
    component: embeddings
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      protocol: TCP
