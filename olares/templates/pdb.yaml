# ============================================================================
# PodDisruptionBudget: Insilo
#
# Sorgt dafur, dass bei Updates mindestens ein Pod pro kritischen
# Komponente verbleibt — verhindert Downtime beim Rolling-Update.
# ============================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: insilo-pdb
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: insilo
