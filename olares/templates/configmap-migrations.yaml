      'Strukturiertes Protokoll für jährliche Kunden- oder Bestandsgespräche.',
      'consulting',
      'Du bist ein erfahrener Berater. Analysiere das folgende Jahresgespräch und erstelle ein strukturiertes Protokoll für die Kundenakte.
    
