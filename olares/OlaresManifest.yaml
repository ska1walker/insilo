# ============================================================================
# OlaresManifest.yaml — Insilo
#
# Spec: https://docs.olares.com/developer/develop/package/manifest.html
# Spec-Version: 0.11.0
#
# Linter-Regeln (kritisch):
# - metadata.name, metadata.appid, Chart.yaml.name und Folder-Name MÜSSEN
#   alle exakt "insilo" sein (regex: ^[a-z0-9]{1,30}$, keine Bindestriche!)
# - metadata.version MUSS Chart.yaml.version matchen
# - spec.versionName MUSS Chart.yaml.appVersion matchen
# - requiredDisk MUSS gesetzt sein (regex: ^(?:\d+(?:\.\d+)?)[kKMGTP]?i?$)
# ============================================================================

olaresManifest.version: '0.11.0'
olaresManifest.type: app

metadata:
  name: insilo
  appid: insilo                # MUSS identisch zu metadata.name sein
  title: Insilo
  description: On-premise meeting intelligence — record, transcribe and summarize meetings without sending audio or notes to any cloud.
  icon: https://raw.githubusercontent.com/ska1walker/insilo/main/icon.png
  version: 0.1.51              # = Chart.yaml.version
  categories:
    - Productivity_v112
    - Utilities_v112
    - Productivity

# ---- Entrances --------------------------------------------------------------
# Zwei Entrances: PWA (sichtbar) + Backend-API (invisible).
# Whisper, Ollama, Embeddings sind NICHT als Entrance deklariert — nur
# namespace-intern erreichbar.

entrances:
  - name: insilo                # MUSS metadata.name matchen (Marc's Gold-Standard-Regel)
    host: insilo                # = K8s-Service-Name (services.yaml + deployment.metadata.name)
    port: 3000
    title: Insilo
    icon: https://raw.githubusercontent.com/ska1walker/insilo/main/icon.png
    authLevel: internal         # LAN-User: kein Authelia-Prompt. Authelia nur bei Remote-Access (Tailscale/Cloudflare-Tunnel). Matches Marc's aimighty-apps pattern.
    invisible: false
    openMethod: window          # erlaubt Click → öffnet PWA in neuem Tab (sonst nur "running" State)

# Hinweis: api-Entrance wurde in v0.1.12 entfernt.
# Grund: Mit Entrance + Envoy-Sidecar interzepiert das Backend-Sidecar
# ALLE TCP-Inbounds und macht Authelia-Check. Interne Calls von Next.js
# (proxy via rewrites()) hatten dabei keine Authelia-Cookies und kriegten 401.
# Ohne api-Entrance läuft das Backend ohne Envoy-Sidecar (1/1 statt 2/2),
# Next.js Server-Proxy ruft direkt http://insilo-backend:8000, Backend
# liest X-Bfl-User-Header das Next.js aus der Frontend-Request weiterreicht.

# ---- System-Middlewares ----------------------------------------------------
# Olares stellt Postgres + Redis (KVRocks) als geteilte System-Services bereit.
# Diese Block sagt Olares: "Lege mir bitte einen DB-User + Datenbank + Redis-
# Namespace an und reiche die Connection-Daten als .Values.postgres.* und
# .Values.redis.* in die Helm-Templates."

middleware:
  postgres:
    username: insilo
    databases:
      - name: insilo
        extensions:
          - vector       # pgvector — für BGE-M3 Embeddings (Phase 3)
          - pg_trgm      # Trigram-Suche
          - pgcrypto     # Verschlüsselte Felder
          - uuid-ossp    # UUID-Generierung
  redis:
    namespace: insilo    # Olares generiert das Passwort selbst und injiziert es als .Values.redis.password — KEIN `password:` Feld hier!

# ---- Berechtigungen ---------------------------------------------------------

permission:
  appCache: true                # für /app/cache (Whisper-Modelle, temp uploads)
  appData: true                 # für /app/data (Audio, persistente Daten)
  # userData: []                # MVP: kein Zugriff auf User-Home-Verzeichnis

  # Cross-App-Zugriff: wir konsumieren das LLM aus der Olares-LiteLLM-App
  # statt ein eigenes Ollama mitzubringen. Spart 4-GB-Image + GPU-Slot.
  provider:
    - appName: litellm
      providerName: api
      podSelectors:
        - matchLabels:
            io.kompose.service: litellm

# ---- Provider (für zukünftige Cross-App-Integration) -----------------------
# In Phase 5+ aktivieren, wenn CallList/andere kaivo-Apps auf Insilo zugreifen sollen.
# provider:
#   - name: insilo-meetings-api
#     entrance: insilo-backend
#     paths: ["/api/v1/meetings"]
#     verbs: ["GET"]

# ---- Spec ------------------------------------------------------------------

spec:
  versionName: '0.1.51'         # = Chart.yaml.appVersion (Marc's Golden Rule: identisch zu metadata.version)

  # Marketing assets — TODO Kai: durch echte Screenshots ersetzen vor Submission
  featuredImage: https://raw.githubusercontent.com/ska1walker/insilo/main/icon.png
  promoteImage:
    - https://raw.githubusercontent.com/ska1walker/insilo/main/icon.png

  fullDescription: |
    **Insilo** is on-premise meeting intelligence for compliance-driven organizations.

    **What it does**
    - Records business meetings via a PWA (push-to-record or upload)
    - Transcribes audio locally with OpenAI Whisper (speaker diarization upcoming)
    - Generates structured summaries using a local LLM via the Olares LiteLLM gateway
    - Lets you ask follow-up questions across your entire meeting archive (RAG over pgvector embeddings)

    **The promise**
    Unlike PLAUD, Otter, Fireflies or similar services, **no audio, transcript, or search index ever leaves your Olares box**. No cloud calls, no third-party AI APIs, no telemetry.

    **Designed for**
    Law firms, tax consultancies, management consultants and German Mittelstand companies with strict compliance requirements (GDPR, BSI Grundschutz, attorney-client privilege).

    **Tech stack**
    - Frontend: Next.js 15 PWA
    - Backend: FastAPI + Celery
    - Transcription: faster-whisper (CPU-optimized)
    - LLM: routed through Olares LiteLLM gateway (Qwen, Llama, etc.)
    - Embeddings: BGE-M3 (multilingual)
    - Storage: PostgreSQL with pgvector + MinIO (provided by Olares)

    **Note**: First boot downloads ~3 GB of AI models from HuggingFace (Whisper + BGE-M3). After that, the app operates fully offline.

  upgradeDescription: |
    v0.1.17 — UI/UX-Polish + Robustheit.

    - Einstellungen: „Verbindung testen"-Button pingt den konfigurierten
      LLM-Endpunkt und zeigt Status, Latenz und Modellnamen.
    - Meeting-Detail: „Erneut zusammenfassen" für fehlgeschlagene Meetings,
      nutzt das vorhandene Transkript und das aktuelle LLM-Setup.
    - Fragen-Suche: Score wird als Prozent-Relevanz angezeigt statt als Float.
    - Aufnahme: Datensouveränitäts-Hinweis statt Dev-Text.

  developer: kaivo.studio
  website: https://kaivo.studio
  sourceCode: https://github.com/ska1walker/insilo
  submitter: ska1walker
  locale:
    - en-US
    - de-DE
  doc: https://github.com/ska1walker/insilo#readme
  license:
    - text: Proprietary — kaivo.studio Commercial License
      url: https://kaivo.studio
  supportArch:
    - amd64

  # Note: `runAsInternal: true` was tried in v0.1.14 to grant cross-NS access
  # to the Olares LiteLLM gateway, but turned out to interact badly with the
  # frontend Envoy sidecar's check-auth init container. Sticking with normal
  # app scope — users who want a non-default LLM endpoint configure it via
  # the Einstellungen UI instead.

  # ---- Ressourcen-Anforderungen --------------------------------------------
  # Werden bei Installation reserviert.
  # LLM kommt via LiteLLM aus dem Olares-System (kein eigenes Ollama mehr),
  # daher deutlich schlanker als die ursprüngliche Schätzung.

  requiredCpu: 2000m            # 2 vCPU baseline (Backend + Worker + Whisper)
  requiredMemory: 12Gi          # Backend + Frontend + Worker + Whisper + Embeddings
  requiredDisk: 30Gi            # Audio (~10 GB), Whisper-Modelle (~3 GB), DB-Anteil

  # ---- Ressourcen-Limits ---------------------------------------------------
  limitedCpu: 6000m
  limitedMemory: 24Gi
  limitedDisk: 100Gi

# ---- Optionen ---------------------------------------------------------------

options:
  # System-Dependencies: bestimmte Olares-Version mindestens nötig
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.2'

  # Erlaubt mehrere isolierte Instanzen (z.B. eine pro Mandant) — MVP: nein
  allowMultipleInstall: false

  # Erlaubte ausgehende Netzwerkverbindungen: nur HTTPS (443) für den
  # einmaligen HuggingFace-Modell-Download beim Erst-Start (Whisper + BGE-M3).
  # Nach dem Cache-Warm-up läuft die App vollständig offline. Audio, Transkripte
  # und Embeddings verlassen nie die Box — der einzige Outbound ist der Modell-Pull.
  allowedOutboundPorts:
    - 443

  # Sicherheits-Kontext: niemals als root laufen
  runAsUser: "1000"

  # Scope: per-user installiert (nicht cluster-shared). Olares setzt damit
  # automatisch das bytetrade.io/ns-owner=<username> Label auf den Namespace,
  # wodurch die NetworkPolicy-Selektoren in user-system-* unsere Pods
  # zur Authelia/IAM/Redis-/Postgres-Kommunikation zulassen. Ohne diesen
  # Block kriegen wir nur die generische `others-np` NetworkPolicy und
  # check-auth findet die System-Services nicht.
  appScope:
    clusterScoped: false
