# ============================================================================
# values.yaml — Default Helm Values für Insilo
#
# Diese Werte können beim Helm-Install per --set überschrieben werden.
# Olares injiziert zusätzlich automatisch:
#   .Values.bfl.username
#   .Values.user.zone
#   .Values.userspace.appData / appCache / userData
#   .Values.postgres.*   (wenn middleware: postgres deklariert)
#   .Values.redis.*      (wenn middleware: redis deklariert)
#   .Values.cluster.arch
# ============================================================================

# ---- Image-Konfiguration ---------------------------------------------------

images:
  frontend:
    repository: ghcr.io/ska1walker/insilo-frontend
    tag: 0.1.0
    pullPolicy: IfNotPresent

  backend:
    repository: ghcr.io/ska1walker/insilo-backend
    tag: 0.1.0
    pullPolicy: IfNotPresent

  whisper:
    repository: ghcr.io/ska1walker/insilo-whisper
    tag: 0.1.0
    pullPolicy: IfNotPresent

  ollama:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent

  embeddings:
    repository: ghcr.io/ska1walker/insilo-embeddings
    tag: 0.1.0
    pullPolicy: IfNotPresent

# ---- KI-Modelle ------------------------------------------------------------
# VRAM-Budget auf einer 24 GB-GPU (RTX 5090 Laptop):
#   whisper large-v3 ≈ 3 GB · qwen 7B ≈ 5 GB · embeddings (CPU) = 0 GB
#   = ~8 GB Reserve für Insilo. Andere Olares-Apps können parallel laufen.
#
# Wenn die Box mehr VRAM hat (Olares One Pro etc.) oder du Insilo allein
# laufen lässt: `ollama: qwen2.5:14b-instruct-q4_K_M` setzen (~10 GB).

models:
  whisper: large-v3
  ollama: qwen2.5:7b-instruct
  embeddings: BAAI/bge-m3

# ---- Anwendungskonfiguration -----------------------------------------------

app:
  language: de
  defaultTimezone: Europe/Berlin
  audioRetentionDays: 90
  softDeleteRetentionDays: 30
  maxUploadSizeMb: 500
