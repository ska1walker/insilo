# ============================================================================
# Deployment: Insilo Whisper Service
#
# faster-whisper + pyannote.audio für Transkription + Speaker Diarization.
# Braucht 1 NVIDIA GPU (~3 GB VRAM).
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: insilo-whisper
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: whisper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insilo
      component: whisper
  template:
    metadata:
      labels:
        app: insilo
        component: whisper
    spec:
      containers:
        - name: whisper
          image: "{{ .Values.images.whisper.repository }}:{{ .Values.images.whisper.tag }}"
          imagePullPolicy: {{ .Values.images.whisper.pullPolicy }}
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: WHISPER_MODEL
              value: "{{ .Values.models.whisper }}"
            - name: WHISPER_DEVICE
              value: "cuda"
            - name: WHISPER_COMPUTE_TYPE
              value: "float16"
            - name: MODELS_DIR
              value: "/app/cache/models"

          volumeMounts:
            - name: app-cache
              mountPath: /app/cache

          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 4000m
              memory: 8Gi
              nvidia.com/gpu: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60      # Modell-Load braucht Zeit
            periodSeconds: 10

      volumes:
        - name: app-cache
          hostPath:
            path: {{ .Values.userspace.appCache }}
            type: DirectoryOrCreate
