# ============================================================================
# docker-compose.yml — lokale Olares-Middleware-Emulation
#
# Olares stellt PostgreSQL, KVRocks und MinIO als geteilte System-Middlewares
# bereit. Lokal emulieren wir das hier.
#
# NICHT für Produktion. In Produktion läuft alles auf der Olares-Box.
# ============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: insilo_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: insilo
      POSTGRES_PASSWORD: insilo_dev_only
      POSTGRES_DB: insilo
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insilo -d insilo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: insilo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  minio:
    image: minio/minio:latest
    container_name: insilo_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: insilo_dev
      MINIO_ROOT_PASSWORD: insilo_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ---- Embeddings service (Phase 3) --------------------------------------
  # BGE-M3 on CPU. Sentence-transformers downloads weights on first start.
  embeddings:
    build: ./services/embeddings
    container_name: insilo_embeddings
    restart: unless-stopped
    environment:
      MODEL: BAAI/bge-m3
      DEVICE: cpu
      CACHE_DIR: /app/cache/embeddings
    ports:
      - "8002:8002"
    volumes:
      - embeddings_cache:/app/cache

  # ---- Whisper service (Phase 1) -----------------------------------------
  # Local dev uses faster-whisper on CPU with the "tiny" model so the
  # transcription pipeline can be exercised end-to-end without a GPU.
  # On Olares: large-v3 on the GPU node (see olares/templates/deployment-whisper.yaml).
  whisper:
    build: ./services/whisper
    container_name: insilo_whisper
    restart: unless-stopped
    environment:
      MODEL: tiny
      DEVICE: cpu
      COMPUTE_TYPE: int8
      CACHE_DIR: /app/cache/whisper
    ports:
      - "8001:8001"
    volumes:
      - whisper_cache:/app/cache

  # ---- Optional: Ollama lokal (für Phase 2+) -----------------------------
  # Erfordert NVIDIA-GPU + nvidia-docker.
  # Auf macOS: nicht aktivieren, stattdessen Ollama nativ via brew install.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: insilo_ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  pg_data:
  redis_data:
  minio_data:
  whisper_cache:
  embeddings_cache:
  # ollama_data:
