name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend · typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: install deps
        working-directory: frontend
        run: npm ci

      - name: type-check
        working-directory: frontend
        run: npm run type-check

      - name: build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_USER: ci

  backend:
    name: backend · ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff
        working-directory: backend
        run: ruff check .

      - name: mypy
        working-directory: backend
        run: mypy app || true   # strict typing target — not blocking yet in phase 1

  whisper-service:
    name: services/whisper · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install ruff
        run: pip install ruff

      - name: ruff
        working-directory: services/whisper
        run: ruff check . || true   # service is small; warn rather than block
