# ============================================================================
# Deployment: Insilo Frontend (Next.js PWA)
#
# Wichtige Regeln (Olares-Linter):
# - metadata.name MUSS literal sein, NICHT {{ .Release.Name }}
# - namespace: {{ .Release.Namespace }} ist die EINZIGE erlaubte Helm-Variable in metadata
# - app-Labels MÜSSEN dem App-Namen entsprechen
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: insilo                  # MUSS Service.metadata.name + entrance[0].host matchen (Marc's Regel)
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insilo
      component: frontend
  template:
    metadata:
      labels:
        app: insilo
        component: frontend
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: "https://{{ index .Values.domain "api" }}"
            - name: NEXT_PUBLIC_USER
              value: "{{ .Values.bfl.username }}"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
