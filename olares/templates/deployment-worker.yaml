# ============================================================================
# Deployment: Insilo Celery Worker
#
# Nutzt dasselbe Container-Image wie Backend, nur mit anderem Startbefehl.
# Lauscht auf KVRocks-Queue und orchestriert: Transcribe -> Summarize -> Embed.
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: insilo-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insilo
      component: worker
  template:
    metadata:
      labels:
        app: insilo
        component: worker
    spec:
      initContainers:
        # hostPath mounts at /app/{cache,data} are owned by root on the host;
        # the main container runs as uid 1000 and the Dockerfile-chown gets
        # shadowed by the mount overlay. Chown the mount before the app starts.
        - name: init-chown
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 1000:1000 /app/cache /app/data']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-cache
              mountPath: /app/cache
            - name: app-data
              mountPath: /app/data
      containers:
        - name: worker
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
          command:
            - "celery"
            - "-A"
            - "app.worker:celery_app"
            - "worker"
            - "-l"
            - "info"
            - "--concurrency=2"
          env:
            # Gleiche Env-Variablen wie Backend (DB + Redis + Services)
            - name: DB_HOST
              value: "{{ .Values.postgres.host }}"
            - name: DB_PORT
              value: "{{ .Values.postgres.port }}"
            - name: DB_USER
              value: "{{ .Values.postgres.username }}"
            - name: DB_PASSWORD
              value: "{{ .Values.postgres.password }}"
            - name: DB_NAME
              value: "{{ .Values.postgres.databases.insilo }}"
            - name: REDIS_HOST
              value: "{{ .Values.redis.host }}"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: REDIS_PASSWORD
              value: "{{ .Values.redis.password }}"
            - name: REDIS_NAMESPACE
              value: "{{ .Values.redis.namespace }}"
            - name: WHISPER_URL
              value: "http://insilo-whisper:8001"
            - name: LLM_BASE_URL
              value: "http://litellm-svc.litellm-{{ .Values.bfl.username }}.svc.cluster.local/v1"
            - name: LLM_API_KEY
              value: "{{ .Values.litellm.apiKey }}"
            - name: LLM_MODEL
              value: "{{ .Values.litellm.model }}"
            - name: EMBEDDINGS_URL
              value: "http://insilo-embeddings:8002"
            - name: APP_DATA_DIR
              value: "{{ .Values.userspace.appData }}"
            - name: APP_CACHE_DIR
              value: "{{ .Values.userspace.appCache }}"
            # Worker liest Audio aus dem gleichen hostPath wie das Backend.
            - name: STORAGE_BACKEND
              value: "local"
            - name: STORAGE_LOCAL_PATH
              value: "/app/data/audio"

          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-cache
              mountPath: /app/cache

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi

      volumes:
        - name: app-data
          hostPath:
            path: {{ .Values.userspace.appData }}
            type: DirectoryOrCreate
        - name: app-cache
          hostPath:
            path: {{ .Values.userspace.appCache }}
            type: DirectoryOrCreate
