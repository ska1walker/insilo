# ============================================================================
# Job: Apply DB schema + seed templates to the Olares-provided Postgres.
#
# Runs once per `helm install` / `helm upgrade` (post-install hook). Each SQL
# file is sent to Postgres as a single `execute()` call via asyncpg, which
# means the whole file is one implicit transaction — the exact same pattern
# we successfully used for the manual replay on v0.1.13. We use the backend
# image because it already ships asyncpg.
#
# Migrations themselves are idempotent (CREATE TABLE IF NOT EXISTS, ON
# CONFLICT DO NOTHING), so re-running on upgrade is a no-op.
#
# NOTE: the ConfigMap is created via a pre-install hook (see
# configmap-migrations.yaml).
# ============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: insilo-migrate-r{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: migrations
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 240
  template:
    metadata:
      labels:
        app: insilo
        component: migrations
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          env:
            - name: DB_HOST
              value: "{{ .Values.postgres.host }}"
            - name: DB_PORT
              value: "{{ .Values.postgres.port }}"
            - name: DB_USER
              value: "{{ .Values.postgres.username }}"
            - name: DB_PASSWORD
              value: "{{ .Values.postgres.password }}"
            - name: DB_NAME
              value: "{{ .Values.postgres.databases.insilo }}"
          command:
            - python3
            - -c
            - |
              import asyncio, asyncpg, glob, os, sys

              async def main() -> None:
                  print(f"Connecting to {os.environ['DB_HOST']}:{os.environ['DB_PORT']} as {os.environ['DB_USER']}...", flush=True)
                  conn = await asyncpg.connect(
                      host=os.environ["DB_HOST"],
                      port=int(os.environ["DB_PORT"]),
                      user=os.environ["DB_USER"],
                      password=os.environ["DB_PASSWORD"],
                      database=os.environ["DB_NAME"],
                  )
                  try:
                      for path in sorted(glob.glob("/sql/*.sql")):
                          print(f"Applying {path}...", flush=True)
                          with open(path) as fp:
                              sql = fp.read()
                          await conn.execute(sql)
                          print(f"  ok ({len(sql)} bytes)", flush=True)
                  finally:
                      await conn.close()
                  print("Migrations complete.", flush=True)

              try:
                  asyncio.run(main())
              except Exception as exc:
                  print(f"FAILED: {exc}", flush=True)
                  sys.exit(1)
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
      volumes:
        - name: sql
          configMap:
            name: insilo-migrations
