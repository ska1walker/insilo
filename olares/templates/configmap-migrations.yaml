# ============================================================================
# ConfigMap: SQL migration & seed files.
#
# AUTO-GENERATED by scripts/regen-migrations.py.
# DO NOT EDIT this file by hand. Edit supabase/migrations/*.sql or
# supabase/seed.sql instead, then re-run the generator.
#
# Mounted into the backend Deployment's `migrate` init-container, which
# runs them via asyncpg with a retry loop. We can't use Helm hooks here
# because the `bytetrade.io/ns-owner` namespace label that the DB's
# NetworkPolicy keys on is only set AFTER `helm install` completes —
# so a post-install hook can never reach the DB. The init-container
# pattern sidesteps that: the pod just keeps restarting until the
# label is set.
#
# SQL is inlined (rather than via `.Files.Get`) because Olares' chart
# renderer doesn't expose `.Files`.
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: insilo-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: migrations
data:
  0001_initial_schema.sql: |
    -- ========================================================================
    -- 0001_initial_schema.sql
    -- Initial database schema for Insilo on Olares
    --
    -- Hinweis: Keine auth.users-Tabelle (wie bei Supabase) — User-Identität
    -- kommt vom Olares-Authelia-Header X-Bfl-User. Wir mappen den Olares-
    -- Username auf eine interne UUID in unserer users-Tabelle.
    -- ========================================================================
    
    -- Extensions
    create extension if not exists "uuid-ossp";
    create extension if not exists "pgcrypto";
    create extension if not exists "vector";
    create extension if not exists "pg_trgm";
    
    -- ========================================================================
    -- USERS (Mapping zwischen Olares-Username und interner UUID)
    -- ========================================================================
    
    create table public.users (
      id              uuid primary key default uuid_generate_v4(),
      olares_username text not null unique,         -- aus X-Bfl-User Header
      email           text,
      display_name    text,
      created_at      timestamptz not null default now(),
      last_seen_at    timestamptz not null default now(),
      deleted_at      timestamptz
    );
    
    create index users_olares_idx on public.users (olares_username) where deleted_at is null;
    
    -- ========================================================================
    -- ORGANIZATIONS (Mandanten)
    -- ========================================================================
    
    create table public.orgs (
      id              uuid primary key default uuid_generate_v4(),
      name            text not null,
      slug            text unique not null,
      industry        text,                                  -- "law", "tax", "consulting", "industry"
      settings        jsonb not null default '{}'::jsonb,
      audio_retention_days integer not null default 90,
      created_at      timestamptz not null default now(),
      updated_at      timestamptz not null default now(),
      deleted_at      timestamptz
    );
    
    create index orgs_slug_idx on public.orgs (slug) where deleted_at is null;
    
    -- ========================================================================
    -- USER ↔ ORG MAPPING (Multi-Tenancy)
    -- ========================================================================
    
    create type public.user_role as enum ('owner', 'admin', 'member', 'viewer');
    
    create table public.user_org_roles (
      user_id         uuid not null references public.users(id) on delete cascade,
      org_id          uuid not null references public.orgs(id) on delete cascade,
      role            public.user_role not null default 'member',
      joined_at       timestamptz not null default now(),
      primary key (user_id, org_id)
    );
    
    create index user_org_roles_user_idx on public.user_org_roles (user_id);
    create index user_org_roles_org_idx on public.user_org_roles (org_id);
    
    -- ========================================================================
    -- TEMPLATES
    -- ========================================================================
    
    create table public.templates (
      id              uuid primary key default uuid_generate_v4(),
      org_id          uuid references public.orgs(id) on delete cascade,
      name            text not null,
      description     text,
      category        text,
      system_prompt   text not null,
      output_schema   jsonb not null,
      is_system       boolean not null default false,
      is_active       boolean not null default true,
      version         integer not null default 1,
      created_by      uuid references public.users(id),
      created_at      timestamptz not null default now(),
      updated_at      timestamptz not null default now()
    );
    
    create index templates_org_idx on public.templates (org_id) where is_active = true;
    create index templates_system_idx on public.templates (is_system) where is_active = true;
    
    -- ========================================================================
    -- MEETINGS
    -- ========================================================================
    
    create type public.meeting_status as enum (
      'draft',
      'uploading',
      'queued',
      'transcribing',
      'transcribed',
      'summarizing',
      'embedding',
      'ready',
      'failed',
      'archived'
    );
    
    create table public.meetings (
      id              uuid primary key default uuid_generate_v4(),
      org_id          uuid not null references public.orgs(id) on delete cascade,
      created_by      uuid not null references public.users(id),
      title           text not null default 'Unbenanntes Meeting',
      description     text,
      status          public.meeting_status not null default 'draft',
      recorded_at     timestamptz not null default now(),
      duration_sec    integer,
      audio_path      text,                                 -- Pfad in MinIO oder /app/data
      audio_size_bytes bigint,
      speaker_count   smallint,
      language        text default 'de',
      template_id     uuid references public.templates(id),
      metadata        jsonb not null default '{}'::jsonb,
      error_message   text,
      created_at      timestamptz not null default now(),
      updated_at      timestamptz not null default now(),
      deleted_at      timestamptz
    );
    
    create index meetings_org_idx on public.meetings (org_id) where deleted_at is null;
    create index meetings_status_idx on public.meetings (status) where deleted_at is null;
    create index meetings_recorded_idx on public.meetings (recorded_at desc) where deleted_at is null;
    create index meetings_title_trgm on public.meetings using gin (title gin_trgm_ops);
    
    -- ========================================================================
    -- TRANSCRIPTS
    -- ========================================================================
    
    create table public.transcripts (
      id              uuid primary key default uuid_generate_v4(),
      meeting_id      uuid not null unique references public.meetings(id) on delete cascade,
      segments        jsonb not null,
      speakers        jsonb not null default '[]'::jsonb,
      full_text       text not null,
      language        text not null default 'de',
      whisper_model   text not null,
      diarization_model text,
      word_count      integer,
      created_at      timestamptz not null default now()
    );
    
    create index transcripts_fulltext_idx on public.transcripts using gin (to_tsvector('german', full_text));
    
    -- ========================================================================
    -- SUMMARIES
    -- ========================================================================
    
    create table public.summaries (
      id              uuid primary key default uuid_generate_v4(),
      meeting_id      uuid not null references public.meetings(id) on delete cascade,
      template_id     uuid not null references public.templates(id),
      template_version integer not null,
      content         jsonb not null,
      llm_model       text not null,
      generation_time_ms integer,
      is_current      boolean not null default true,
      created_at      timestamptz not null default now()
    );
    
    create index summaries_meeting_idx on public.summaries (meeting_id) where is_current = true;
    
    -- ========================================================================
    -- MEETING CHUNKS (für RAG)
    -- ========================================================================
    
    create table public.meeting_chunks (
      id              uuid primary key default uuid_generate_v4(),
      meeting_id      uuid not null references public.meetings(id) on delete cascade,
      chunk_index     integer not null,
      content         text not null,
      start_time_sec  integer,
      end_time_sec    integer,
      speaker_ids     text[],
      embedding       vector(1024),
      token_count     integer,
      created_at      timestamptz not null default now()
    );
    
    create index meeting_chunks_meeting_idx on public.meeting_chunks (meeting_id);
    create index meeting_chunks_embedding_idx on public.meeting_chunks
      using hnsw (embedding vector_cosine_ops);
    
    -- ========================================================================
    -- TAGS
    -- ========================================================================
    
    create table public.tags (
      id              uuid primary key default uuid_generate_v4(),
      org_id          uuid not null references public.orgs(id) on delete cascade,
      name            text not null,
      color           text default '#737065',
      created_at      timestamptz not null default now(),
      unique (org_id, name)
    );
    
    create table public.meeting_tags (
      meeting_id      uuid not null references public.meetings(id) on delete cascade,
      tag_id          uuid not null references public.tags(id) on delete cascade,
      added_at        timestamptz not null default now(),
      primary key (meeting_id, tag_id)
    );
    
    -- ========================================================================
    -- AUDIT LOG
    -- ========================================================================
    
    create table public.audit_log (
      id              uuid primary key default uuid_generate_v4(),
      timestamp       timestamptz not null default now(),
      user_id         uuid references public.users(id),
      olares_user     text,                                -- aus X-Bfl-User
      org_id          uuid references public.orgs(id),
      action          text not null,
      resource_type   text,
      resource_id     uuid,
      ip_address      inet,
      user_agent      text,
      changes         jsonb,
      success         boolean not null default true,
      metadata        jsonb default '{}'::jsonb
    );
    
    create index audit_log_user_idx on public.audit_log (user_id, timestamp desc);
    create index audit_log_org_idx on public.audit_log (org_id, timestamp desc);
    create index audit_log_action_idx on public.audit_log (action, timestamp desc);
    create index audit_log_resource_idx on public.audit_log (resource_type, resource_id);
    
    -- ========================================================================
    -- UPDATED_AT TRIGGER
    -- ========================================================================
    
    create or replace function public.set_updated_at()
    returns trigger as $$
    begin
      new.updated_at = now();
      return new;
    end;
    $$ language plpgsql;
    
    create trigger orgs_updated_at before update on public.orgs
      for each row execute procedure public.set_updated_at();
    
    create trigger meetings_updated_at before update on public.meetings
      for each row execute procedure public.set_updated_at();
    
    create trigger templates_updated_at before update on public.templates
      for each row execute procedure public.set_updated_at();
    
  0002_rls_policies.sql: |
    -- ========================================================================
    -- 0002_rls_policies.sql
    -- Row Level Security für alle Org-gebundenen Tabellen.
    --
    -- Wichtig: Bei Olares haben wir keine auth.users-Tabelle (kein Supabase Auth).
    -- Stattdessen setzen wir bei jedem DB-Connection-Open per
    --   SET LOCAL app.current_user_id = '<uuid>';
    -- den User-Kontext, basierend auf dem X-Bfl-User Header.
    -- Die RLS-Policies lesen diesen Wert.
    -- ========================================================================
    
    -- ========================================================================
    -- Helper Functions
    -- ========================================================================
    
    -- Aktuelle User-ID aus Session-Variable lesen
    create or replace function public.current_user_id()
    returns uuid
    language sql
    stable
    as $$
      select nullif(current_setting('app.current_user_id', true), '')::uuid;
    $$;
    
    -- Welche Orgs gehören zum aktuellen User?
    create or replace function public.current_user_orgs()
    returns setof uuid
    language sql
    stable
    as $$
      select org_id from public.user_org_roles
      where user_id = public.current_user_id();
    $$;
    
    -- Welche Rolle hat der aktuelle User in einer Org?
    create or replace function public.current_user_role_in_org(target_org uuid)
    returns public.user_role
    language sql
    stable
    as $$
      select role from public.user_org_roles
      where user_id = public.current_user_id() and org_id = target_org;
    $$;
    
    -- ========================================================================
    -- RLS aktivieren
    -- ========================================================================
    
    alter table public.orgs enable row level security;
    alter table public.user_org_roles enable row level security;
    alter table public.users enable row level security;
    alter table public.meetings enable row level security;
    alter table public.transcripts enable row level security;
    alter table public.summaries enable row level security;
    alter table public.templates enable row level security;
    alter table public.meeting_chunks enable row level security;
    alter table public.tags enable row level security;
    alter table public.meeting_tags enable row level security;
    alter table public.audit_log enable row level security;
    
    -- ========================================================================
    -- USERS
    -- ========================================================================
    
    -- User sieht nur sich selbst und User, mit denen er eine Org teilt
    create policy users_select on public.users
      for select
      using (
        id = public.current_user_id()
        or id in (
          select user_id from public.user_org_roles
          where org_id in (select public.current_user_orgs())
        )
      );
    
    -- ========================================================================
    -- ORGS
    -- ========================================================================
    
    create policy orgs_select on public.orgs
      for select
      using (id in (select public.current_user_orgs()));
    
    create policy orgs_update on public.orgs
      for update
      using (public.current_user_role_in_org(id) in ('owner', 'admin'));
    
    -- ========================================================================
    -- USER_ORG_ROLES
    -- ========================================================================
    
    create policy user_org_roles_select on public.user_org_roles
      for select
      using (
        user_id = public.current_user_id()
        or org_id in (select public.current_user_orgs())
      );
    
    create policy user_org_roles_modify on public.user_org_roles
      for all
      using (public.current_user_role_in_org(org_id) in ('owner', 'admin'));
    
    -- ========================================================================
    -- MEETINGS
    -- ========================================================================
    
    create policy meetings_select on public.meetings
      for select
      using (
        org_id in (select public.current_user_orgs())
        and deleted_at is null
      );
    
    create policy meetings_insert on public.meetings
      for insert
      with check (
        org_id in (select public.current_user_orgs())
        and created_by = public.current_user_id()
      );
    
    create policy meetings_update on public.meetings
      for update
      using (
        org_id in (select public.current_user_orgs())
        and (
          created_by = public.current_user_id()
          or public.current_user_role_in_org(org_id) in ('owner', 'admin')
        )
      );
    
    create policy meetings_delete on public.meetings
      for delete
      using (public.current_user_role_in_org(org_id) in ('owner', 'admin'));
    
    -- ========================================================================
    -- TRANSCRIPTS
    -- ========================================================================
    
    create policy transcripts_select on public.transcripts
      for select
      using (
        meeting_id in (
          select id from public.meetings
          where org_id in (select public.current_user_orgs())
          and deleted_at is null
        )
      );
    
    -- Inserts kommen vom Worker mit Bypass-Role, kein RLS-Eintrag nötig
    
    -- ========================================================================
    -- SUMMARIES
    -- ========================================================================
    
    create policy summaries_select on public.summaries
      for select
      using (
        meeting_id in (
          select id from public.meetings
          where org_id in (select public.current_user_orgs())
          and deleted_at is null
        )
      );
    
    -- ========================================================================
    -- TEMPLATES
    -- ========================================================================
    
    create policy templates_select on public.templates
      for select
      using (
        is_active = true
        and (
          is_system = true
          or org_id in (select public.current_user_orgs())
        )
      );
    
    create policy templates_insert on public.templates
      for insert
      with check (
        org_id in (select public.current_user_orgs())
        and public.current_user_role_in_org(org_id) in ('owner', 'admin')
        and is_system = false
      );
    
    create policy templates_update on public.templates
      for update
      using (
        org_id in (select public.current_user_orgs())
        and public.current_user_role_in_org(org_id) in ('owner', 'admin')
        and is_system = false
      );
    
    -- ========================================================================
    -- MEETING CHUNKS
    -- ========================================================================
    
    create policy meeting_chunks_select on public.meeting_chunks
      for select
      using (
        meeting_id in (
          select id from public.meetings
          where org_id in (select public.current_user_orgs())
          and deleted_at is null
        )
      );
    
    -- ========================================================================
    -- TAGS
    -- ========================================================================
    
    create policy tags_all on public.tags
      for all
      using (org_id in (select public.current_user_orgs()));
    
    create policy meeting_tags_all on public.meeting_tags
      for all
      using (
        meeting_id in (
          select id from public.meetings
          where org_id in (select public.current_user_orgs())
        )
      );
    
    -- ========================================================================
    -- AUDIT LOG (Append-only)
    -- ========================================================================
    
    create policy audit_log_select on public.audit_log
      for select
      using (
        user_id = public.current_user_id()
        or (
          org_id in (select public.current_user_orgs())
          and public.current_user_role_in_org(org_id) in ('owner', 'admin')
        )
      );
    
    -- Append-only Enforcement
    create policy audit_log_no_update on public.audit_log for update using (false);
    create policy audit_log_no_delete on public.audit_log for delete using (false);
    
  0003_org_settings.sql: |
    -- ========================================================================
    -- 0003_org_settings.sql
    -- Per-org LLM configuration.
    --
    -- Lets each Olares-box owner point Insilo at any OpenAI-compatible
    -- endpoint (their own LiteLLM gateway, a local Ollama, an external API,
    -- ...) without touching the Helm chart. Empty values mean "fall back to
    -- the env defaults baked into the deployment."
    -- ========================================================================
    
    create table if not exists public.org_settings (
      org_id        uuid primary key references public.orgs(id) on delete cascade,
      llm_base_url  text not null default '',
      llm_api_key   text not null default '',
      llm_model     text not null default '',
      updated_at    timestamptz not null default now(),
      updated_by    uuid references public.users(id)
    );
    
    create or replace function public.touch_org_settings_updated_at()
    returns trigger
    language plpgsql
    as $$
    begin
      new.updated_at := now();
      return new;
    end;
    $$;
    
    drop trigger if exists trg_org_settings_updated_at on public.org_settings;
    create trigger trg_org_settings_updated_at
      before update on public.org_settings
      for each row execute function public.touch_org_settings_updated_at();
    
    -- RLS: every org sees its own row, owner/admin may write.
    alter table public.org_settings enable row level security;
    
    drop policy if exists org_settings_select on public.org_settings;
    create policy org_settings_select on public.org_settings
      for select
      using (org_id in (select public.current_user_orgs()));
    
    drop policy if exists org_settings_upsert on public.org_settings;
    create policy org_settings_upsert on public.org_settings
      for all
      using (org_id in (select public.current_user_orgs()))
      with check (org_id in (select public.current_user_orgs()));
    
  0004_template_customizations.sql: |
    -- ========================================================================
    -- 0004_template_customizations.sql
    -- Per-org override of a template's system prompt.
    --
    -- The 4 seed templates (Allgemeine Besprechung, Jahresgespräch, …) ship
    -- with sensible defaults. An org can tailor the prompt to their domain
    -- (legal phrasing for Mandantengespräch, sales-funnel vocabulary for
    -- Vertriebsgespräch, …) without forking the template row itself. Deleting
    -- the customization row reverts the org to the system default.
    -- ========================================================================
    
    create table if not exists public.template_customizations (
      org_id          uuid not null references public.orgs(id) on delete cascade,
      template_id     uuid not null references public.templates(id) on delete cascade,
      system_prompt   text not null,
      updated_at      timestamptz not null default now(),
      updated_by      uuid references public.users(id),
      primary key (org_id, template_id)
    );
    
    drop trigger if exists trg_template_customizations_updated_at on public.template_customizations;
    create trigger trg_template_customizations_updated_at
      before update on public.template_customizations
      for each row execute function public.touch_org_settings_updated_at();
      -- (re-uses the helper from 0003 — same "stamp updated_at on update" pattern)
    
    alter table public.template_customizations enable row level security;
    
    drop policy if exists template_customizations_select on public.template_customizations;
    create policy template_customizations_select on public.template_customizations
      for select
      using (org_id in (select public.current_user_orgs()));
    
    drop policy if exists template_customizations_upsert on public.template_customizations;
    create policy template_customizations_upsert on public.template_customizations
      for all
      using (org_id in (select public.current_user_orgs()))
      with check (org_id in (select public.current_user_orgs()));
    
  0005_webhooks_api_keys.sql: |
    -- ========================================================================
    -- 0005_webhooks_api_keys.sql
    -- Outgoing webhooks + API keys for the external REST API.
    --
    -- Lets an org-owner configure 0..n webhook URLs that receive a signed POST
    -- whenever a meeting transitions state (created / ready / failed / updated
    -- / deleted), and 0..n API keys that authenticate external read access to
    -- meetings + their markdown export.
    --
    -- Webhook secrets stay in clear text (we need them to sign payloads on
    -- every dispatch). API-key TOKENS are stored only as bcrypt hashes — the
    -- raw token is returned exactly once at creation.
    -- ========================================================================
    
    -- ─── Webhooks ───────────────────────────────────────────────────────────
    
    create table if not exists public.org_webhooks (
      id                uuid primary key default uuid_generate_v4(),
      org_id            uuid not null references public.orgs(id) on delete cascade,
      url               text not null,
      secret            text not null,                              -- HMAC-SHA256 key
      -- Allowed event names: meeting.created, meeting.ready,
      -- meeting.failed, meeting.deleted, meeting.updated.
      events            text[] not null default array['meeting.ready']::text[],
      is_active         boolean not null default true,
      description       text not null default '',
      created_at        timestamptz not null default now(),
      created_by        uuid references public.users(id),
      last_success_at   timestamptz,
      last_failure_at   timestamptz,
      last_failure_msg  text
    );
    
    create index if not exists org_webhooks_org_idx
      on public.org_webhooks (org_id) where is_active = true;
    
    -- ─── Webhook delivery audit (last N per webhook) ───────────────────────
    
    create table if not exists public.webhook_deliveries (
      id              uuid primary key default uuid_generate_v4(),
      webhook_id      uuid not null references public.org_webhooks(id) on delete cascade,
      meeting_id      uuid references public.meetings(id) on delete set null,
      event           text not null,
      status_code     int,                                          -- null = transport error
      response_body   text,                                         -- first 512 chars
      error_message   text,
      attempt         int not null default 1,
      created_at      timestamptz not null default now()
    );
    
    create index if not exists webhook_deliveries_webhook_idx
      on public.webhook_deliveries (webhook_id, created_at desc);
    
    -- ─── API Keys ──────────────────────────────────────────────────────────
    
    create table if not exists public.api_keys (
      id            uuid primary key default uuid_generate_v4(),
      org_id        uuid not null references public.orgs(id) on delete cascade,
      name          text not null,                                  -- user-supplied label
      key_prefix    text not null,                                  -- first ~12 chars, for UI
      key_hash      text not null,                                  -- bcrypt
      scopes        text[] not null default array['read:meetings']::text[],
      created_at    timestamptz not null default now(),
      created_by    uuid references public.users(id),
      last_used_at  timestamptz,
      revoked_at    timestamptz
    );
    
    create index if not exists api_keys_org_idx
      on public.api_keys (org_id) where revoked_at is null;
    
    -- Looking up by prefix narrows the candidate set for bcrypt-verify down
    -- to ~1 row on average (12-char random prefix).
    create index if not exists api_keys_prefix_idx
      on public.api_keys (key_prefix) where revoked_at is null;
    
    -- ─── Touch-trigger for the few mutable columns above ─────────────────
    
    -- (We do NOT want a generic updated_at column on these tables — the
    -- last_success_at / last_failure_at / last_used_at fields carry the
    -- relevant timestamps already.)
    
    -- ─── Row Level Security ────────────────────────────────────────────────
    
    alter table public.org_webhooks       enable row level security;
    alter table public.webhook_deliveries enable row level security;
    alter table public.api_keys           enable row level security;
    
    -- org_webhooks: every member of the org may read; writes go via the
    -- backend, which does its own checks. We follow the org_settings pattern
    -- (no role-gate at the RLS layer, app layer enforces it).
    drop policy if exists org_webhooks_select on public.org_webhooks;
    create policy org_webhooks_select on public.org_webhooks
      for select
      using (org_id in (select public.current_user_orgs()));
    
    drop policy if exists org_webhooks_modify on public.org_webhooks;
    create policy org_webhooks_modify on public.org_webhooks
      for all
      using (org_id in (select public.current_user_orgs()))
      with check (org_id in (select public.current_user_orgs()));
    
    -- webhook_deliveries: read-only via app; the worker writes with
    -- superuser privileges (RLS bypassed for that connection).
    drop policy if exists webhook_deliveries_select on public.webhook_deliveries;
    create policy webhook_deliveries_select on public.webhook_deliveries
      for select
      using (
        webhook_id in (
          select id from public.org_webhooks
          where org_id in (select public.current_user_orgs())
        )
      );
    
    -- api_keys: members of the org can list/manage. Raw key_hash never
    -- leaves the backend; the API response shape strips it.
    drop policy if exists api_keys_select on public.api_keys;
    create policy api_keys_select on public.api_keys
      for select
      using (org_id in (select public.current_user_orgs()));
    
    drop policy if exists api_keys_modify on public.api_keys;
    create policy api_keys_modify on public.api_keys
      for all
      using (org_id in (select public.current_user_orgs()))
      with check (org_id in (select public.current_user_orgs()));
    
  0006_org_speakers.sql: |
    -- ========================================================================
    -- 0006_org_speakers.sql
    -- Org-scoped speaker catalog with biometric voiceprints (ECAPA-TDNN, 192-d).
    --
    -- Drei Tabellen:
    --   org_speakers              — was der User sieht (Name + 1 Voiceprint)
    --   speaker_voiceprints       — Audit-Trail aller Samples (löschbar pro Sample)
    --   meeting_speaker_clusters  — Verbindung Meeting↔Cluster↔Speaker
    --
    -- Cosine-Similarity-Matching gegen die L2-normalisierten ECAPA-Embeddings
    -- aus dem Whisper-Service. Voiceprints sind biometrische Daten — sie
    -- verlassen die Olares-Box nie und sind via RLS strikt org-isoliert.
    -- ========================================================================
    
    -- ─── Globaler Org-Roster ───────────────────────────────────────────────
    
    create table if not exists public.org_speakers (
      id            uuid primary key default uuid_generate_v4(),
      org_id        uuid not null references public.orgs(id) on delete cascade,
      display_name  text not null,
      description   text not null default '',
      -- "Das bin ich"-Marker. Höchstens einer pro Org. Fließt ins LLM-Prompt:
      -- die Summary darf den Self-Speaker in zweiter Person formulieren.
      is_self       boolean not null default false,
      created_at    timestamptz not null default now(),
      created_by    uuid references public.users(id),
      -- Primärer Voiceprint = laufender Mittelwert aller Samples,
      -- L2-normalisiert. null wenn Sprecher per Hand angelegt wurde ohne
      -- je gesprochen zu haben — Auto-Match überspringt solche Zeilen.
      voiceprint    vector(192),
      sample_count  int  not null default 0,
      last_heard_at timestamptz,
      unique (org_id, display_name)
    );
    
    create index if not exists org_speakers_org_idx
      on public.org_speakers (org_id);
    
    -- HNSW-Index für Cosine-Similarity. Bei <100 Sprechern technisch
    -- nicht nötig, aber harmlos und zukunftssicher.
    create index if not exists org_speakers_voiceprint_idx
      on public.org_speakers using hnsw (voiceprint vector_cosine_ops)
      where voiceprint is not null;
    
    -- Höchstens ein is_self pro Org.
    create unique index if not exists org_speakers_is_self_idx
      on public.org_speakers (org_id) where is_self = true;
    
    -- ─── Append-only Sample-Sammlung ──────────────────────────────────────
    
    create table if not exists public.speaker_voiceprints (
      id              uuid primary key default uuid_generate_v4(),
      org_speaker_id  uuid not null references public.org_speakers(id) on delete cascade,
      meeting_id      uuid not null references public.meetings(id) on delete cascade,
      cluster_idx     int  not null,
      embedding       vector(192) not null,
      -- 'manual'    User hat den Cluster zugewiesen → Voiceprint gelernt
      -- 'auto-match' Auto-Match-Treffer (wird auch persistiert, damit der
      --              Voiceprint sich über Zeit verfeinert)
      -- 'reseed'    Re-Diarize-Knopf hat eine Stimme neu eingelesen
      source          text not null default 'manual',
      created_at      timestamptz not null default now(),
      created_by      uuid references public.users(id)
    );
    
    create index if not exists speaker_voiceprints_speaker_idx
      on public.speaker_voiceprints (org_speaker_id, created_at desc);
    
    -- ─── Per-Meeting-Diarization-Cluster ──────────────────────────────────
    
    create table if not exists public.meeting_speaker_clusters (
      id              uuid primary key default uuid_generate_v4(),
      meeting_id      uuid not null references public.meetings(id) on delete cascade,
      cluster_idx     int  not null,
      centroid        vector(192) not null,
      org_speaker_id  uuid references public.org_speakers(id) on delete set null,
      match_score     float,
      -- 'auto'    Centroid wurde via Threshold automatisch zugeordnet
      -- 'manual'  User hat den Cluster manuell zugewiesen
      -- 'pending' Cluster ist anonym geblieben (kein Match, kein Mapping)
      assignment      text not null default 'auto',
      created_at      timestamptz not null default now(),
      updated_at      timestamptz not null default now(),
      unique (meeting_id, cluster_idx)
    );
    
    create index if not exists meeting_speaker_clusters_meeting_idx
      on public.meeting_speaker_clusters (meeting_id);
    
    -- updated_at-Trigger
    drop trigger if exists meeting_speaker_clusters_updated_at on public.meeting_speaker_clusters;
    create trigger meeting_speaker_clusters_updated_at
      before update on public.meeting_speaker_clusters
      for each row execute procedure public.set_updated_at();
    
    -- ─── Row Level Security ────────────────────────────────────────────────
    
    alter table public.org_speakers              enable row level security;
    alter table public.speaker_voiceprints       enable row level security;
    alter table public.meeting_speaker_clusters  enable row level security;
    
    drop policy if exists org_speakers_select on public.org_speakers;
    create policy org_speakers_select on public.org_speakers
      for select
      using (org_id in (select public.current_user_orgs()));
    
    drop policy if exists org_speakers_modify on public.org_speakers;
    create policy org_speakers_modify on public.org_speakers
      for all
      using (org_id in (select public.current_user_orgs()))
      with check (org_id in (select public.current_user_orgs()));
    
    drop policy if exists speaker_voiceprints_select on public.speaker_voiceprints;
    create policy speaker_voiceprints_select on public.speaker_voiceprints
      for select
      using (
        org_speaker_id in (
          select id from public.org_speakers
          where org_id in (select public.current_user_orgs())
        )
      );
    
    drop policy if exists speaker_voiceprints_modify on public.speaker_voiceprints;
    create policy speaker_voiceprints_modify on public.speaker_voiceprints
      for all
      using (
        org_speaker_id in (
          select id from public.org_speakers
          where org_id in (select public.current_user_orgs())
        )
      )
      with check (
        org_speaker_id in (
          select id from public.org_speakers
          where org_id in (select public.current_user_orgs())
        )
      );
    
    drop policy if exists meeting_speaker_clusters_select on public.meeting_speaker_clusters;
    create policy meeting_speaker_clusters_select on public.meeting_speaker_clusters
      for select
      using (
        meeting_id in (
          select id from public.meetings
          where org_id in (select public.current_user_orgs())
            and deleted_at is null
        )
      );
    
    drop policy if exists meeting_speaker_clusters_modify on public.meeting_speaker_clusters;
    create policy meeting_speaker_clusters_modify on public.meeting_speaker_clusters
      for all
      using (
        meeting_id in (
          select id from public.meetings
          where org_id in (select public.current_user_orgs())
        )
      )
      with check (
        meeting_id in (
          select id from public.meetings
          where org_id in (select public.current_user_orgs())
        )
      );
    
  0007_speaker_enrollment.sql: |
    -- ========================================================================
    -- 0007_speaker_enrollment.sql
    -- Allow standalone voiceprint enrollments (no associated meeting).
    --
    -- v0.1.37's `speaker_voiceprints.meeting_id` was NOT NULL because every
    -- sample came from a meeting cluster. v0.1.38 introduces the dedicated
    -- "Stimmprobe abgeben"-Flow (user reads "Der Nordwind und die Sonne"),
    -- where there is no meeting attached. We relax the column to nullable
    -- and tag those rows with `source='enrollment'`.
    -- ========================================================================
    
    alter table public.speaker_voiceprints
      alter column meeting_id drop not null;
    
    alter table public.speaker_voiceprints
      alter column cluster_idx drop not null;
    
    -- Index to find enrollment samples fast (no meeting_id).
    create index if not exists speaker_voiceprints_enrollment_idx
      on public.speaker_voiceprints (org_speaker_id)
      where meeting_id is null;
    
  0008_manual_webhooks_template_overrides.sql: |
    -- ========================================================================
    -- 0008_manual_webhooks_template_overrides.sql
    -- Three small, related quality-of-life changes for v0.1.39:
    --
    --   1. Webhooks gain a `trigger_mode` ('auto' | 'manual'). When set to
    --      'manual', the meeting.ready event is NOT auto-dispatched — the
    --      user has to explicitly click "An externe Systeme senden" on the
    --      meeting detail. Other events (created/failed/updated/deleted)
    --      keep their auto behaviour either way.
    --
    --      Existing webhooks are migrated to 'manual' retroactively so the
    --      default is conservative (no surprise outbound traffic after
    --      upgrade).
    --
    --   2. `template_customizations` gains `display_name` + `display_description`,
    --      both NULL-able. When set, the org sees the customised name in
    --      place of the system template's default (e.g. rename
    --      "Mandantengespräch" → "Beratungstermin"). NULL means "use the
    --      original".
    --
    --   3. No schema change for meetings — `meetings.title` is already
    --      mutable. The corresponding PATCH endpoint lives in the backend.
    -- ========================================================================
    
    -- ─── Webhook trigger mode ──────────────────────────────────────────────
    
    alter table public.org_webhooks
      add column if not exists trigger_mode text not null default 'manual'
        check (trigger_mode in ('auto', 'manual'));
    
    -- Retroactively flip all existing webhooks to manual — caller-asked
    -- behaviour ("safer default also for legacy rows").
    update public.org_webhooks set trigger_mode = 'manual';
    
    -- ─── Template name/description overrides ───────────────────────────────
    
    alter table public.template_customizations
      add column if not exists display_name text;
    
    alter table public.template_customizations
      add column if not exists display_description text;
    
  0009_template_few_shot.sql: |
    -- ========================================================================
    -- 0009_template_few_shot.sql
    -- Per-template few-shot example for v0.1.40 prompt quality iteration.
    --
    -- For Qwen2.5 14B Q4_K_M (the on-prem default on Olares), one
    -- hand-curated user→assistant example before the real meeting cuts
    -- hallucinations and tightens JSON shape adherence noticeably. The
    -- example lives ON the template — same lifecycle as system_prompt +
    -- output_schema, so customising a template via the UI continues to
    -- behave intuitively.
    --
    -- Both columns are nullable: legacy templates without an example keep
    -- working (summarize.py just sends the system + real-user messages).
    -- ========================================================================
    
    alter table public.templates
      add column if not exists few_shot_input  text;
    
    alter table public.templates
      add column if not exists few_shot_output jsonb;
    
  0010_template_custom_fields.sql: |
    -- ========================================================================
    -- 0010_template_custom_fields.sql
    -- Lite-Schema-Editor (v0.1.41): org-spezifische Zusatzfelder pro Template.
    --
    -- Im Gegensatz zum vollen Schema-Editor (irgendwann v0.1.42+) erlauben
    -- wir hier nur das *Hinzufügen* von Feldern — die fixen Felder der
    -- System-Vorlagen bleiben unangetastet, damit Anzeige-Renderer und
    -- existing Summaries weiter konsistent funktionieren. Eingriffe wie
    -- "Umbenennen" oder "Löschen" bleiben Phase 2 vorbehalten.
    --
    -- Format der custom_fields-JSONB:
    --   [
    --     {"name": "geburtsdatum", "label": "Geburtsdatum",
    --      "type": "string", "description": "Tag.Monat.Jahr falls genannt"},
    --     {"name": "zeugen", "label": "Zeugen",
    --      "type": "array_string", "description": "Namen der Zeugen"},
    --     ...
    --   ]
    --
    -- Erlaubte `type`-Werte (v0.1.41):
    --   "string"        → einfaches Textfeld
    --   "array_string"  → Liste von Texten
    -- ========================================================================
    
    alter table public.template_customizations
      add column if not exists custom_fields jsonb not null default '[]'::jsonb;
    
  0011_ui_locale.sql: |
    -- ========================================================================
    -- 0011_ui_locale.sql
    -- UI-Locale-Settings für i18n (v0.1.43+). Resolution-Hierarchie:
    --   user.ui_locale > org_settings.ui_locale > Browser Accept-Language > 'de'
    --
    -- Beide Spalten sind nullable: null bedeutet "kein Override an dieser
    -- Stelle, gehe zur nächsten Resolution-Stufe". So bleibt jede existing
    -- Org per Default deutsch ohne Migration-Backfill.
    -- ========================================================================
    
    alter table public.org_settings
      add column if not exists ui_locale text;
    
    alter table public.users
      add column if not exists ui_locale text;
    
    -- CHECK-Constraints: nur die fünf von uns unterstützten Sprachen.
    -- 'de' = Deutsch, 'en' = Englisch, 'fr' = Französisch,
    -- 'es' = Spanisch, 'it' = Italienisch.
    do $$
    begin
      if not exists (
        select 1 from pg_constraint where conname = 'org_settings_ui_locale_valid'
      ) then
        alter table public.org_settings
          add constraint org_settings_ui_locale_valid
          check (ui_locale is null or ui_locale in ('de', 'en', 'fr', 'es', 'it'));
      end if;
    
      if not exists (
        select 1 from pg_constraint where conname = 'users_ui_locale_valid'
      ) then
        alter table public.users
          add constraint users_ui_locale_valid
          check (ui_locale is null or ui_locale in ('de', 'en', 'fr', 'es', 'it'));
      end if;
    end$$;
    
  0012_template_locale_prompts.sql: |
    -- ========================================================================
    -- 0012_template_locale_prompts.sql
    -- LLM-Prompts pro UI-Sprache (v0.1.46+).
    --
    -- Bisher hat jedes Template einen einzelnen `system_prompt TEXT`-Slot
    -- — die LLM antwortet entsprechend nur in der Sprache dieses Prompts
    -- (de). Mit der vollständigen UI-i18n (v0.1.43–v0.1.45) muss auch das
    -- LLM-Output zur User-Sprache passen.
    --
    -- Migration-Strategie:
    --   1. Neue Spalte `system_prompts JSONB` mit Map `{de,en,fr,es,it}`.
    --   2. Backfill: existierender `system_prompt` → `system_prompts.de`.
    --   3. `system_prompt TEXT` bleibt zunächst aktiv (Backward-Compat) —
    --      summarize.py liest `coalesce(system_prompts->>locale,
    --      system_prompts->>'de', system_prompt)`.
    --   4. Drop von `system_prompt` erfolgt in einer späteren Migration,
    --      wenn alle Code-Pfade auf JSONB umgestellt sind.
    --
    -- Selbe Logik für `template_customizations` — Org-Overrides müssen
    -- ebenfalls pro Sprache geführt werden, sonst überschreibt eine
    -- deutsche Customization den englischen Default.
    -- ========================================================================
    
    alter table public.templates
      add column if not exists system_prompts jsonb not null default '{}'::jsonb;
    
    alter table public.template_customizations
      add column if not exists system_prompts jsonb not null default '{}'::jsonb;
    
    -- Backfill: bestehende deutschen Prompts in die JSONB-Map heben.
    -- Nur, wo das Ziel noch leer ist — idempotent bei Re-Runs.
    --
    -- ACHTUNG (nachträglich angepasst in v0.1.50): das Backfill-UPDATE wird
    -- in eine DO-Block gewrapped, der prüft ob die Legacy-Spalte überhaupt
    -- noch existiert. Hintergrund: Migration 0013 dropt `system_prompt`.
    -- Der Init-Container-Runner versucht beim Re-Deploy alle SQL-Files in
    -- Reihenfolge erneut — ohne diesen Guard schlägt 0012 dann fehl, weil
    -- die referenzierte Spalte weg ist. Bei First-Install (Spalte existiert
    -- noch beim 0012-Run, 0013 droppt erst danach) läuft der Backfill
    -- normal durch.
    do $$
    begin
      if exists (
        select 1 from information_schema.columns
        where table_schema = 'public'
          and table_name = 'templates'
          and column_name = 'system_prompt'
      ) then
        execute $sql$
          update public.templates
             set system_prompts = jsonb_build_object('de', system_prompt)
           where system_prompt is not null
             and (system_prompts = '{}'::jsonb or system_prompts is null)
        $sql$;
      end if;
      if exists (
        select 1 from information_schema.columns
        where table_schema = 'public'
          and table_name = 'template_customizations'
          and column_name = 'system_prompt'
      ) then
        execute $sql$
          update public.template_customizations
             set system_prompts = jsonb_build_object('de', system_prompt)
           where system_prompt is not null
             and (system_prompts = '{}'::jsonb or system_prompts is null)
        $sql$;
      end if;
    end $$;
    
  0013_drop_legacy_system_prompt.sql: |
    -- ========================================================================
    -- 0013_drop_legacy_system_prompt.sql
    -- Drop legacy TEXT prompt slots + meetings.language default (v0.1.48).
    --
    -- Hintergrund:
    --   * Seit Migration 0012 existieren `templates.system_prompts JSONB`
    --     und `template_customizations.system_prompts JSONB` mit Backfill
    --     `{ "de": <legacy prompt> }`. Der Resolver in summarize.py liest
    --     bevorzugt aus der JSONB-Map. In v0.1.48 wurden alle Lese- und
    --     Schreib-Sites auf die JSONB-Variante umgestellt — die TEXT-Spalten
    --     sind tot.
    --   * `meetings.language` hatte einen Hardcoded-Default `'de'`, der den
    --     v0.1.48-Selector (User-Choice incl. Auto-Detect) unterläuft.
    --     NULL = Whisper auto-detect, alles andere = ISO-Code.
    --
    -- Eine Rückkehr zur TEXT-Spalte ist nicht vorgesehen. Bei Rollback der
    -- Helm-Revision würde die Init-Container-Migration den DROP wiederholen
    -- (idempotent durch IF EXISTS), die Spalte bliebe weg.
    -- ========================================================================
    
    alter table public.templates
      drop column if exists system_prompt;
    
    alter table public.template_customizations
      drop column if exists system_prompt;
    
    alter table public.meetings
      alter column language drop default;
    
  0099_seed.sql: |
    -- ========================================================================
    -- seed.sql — System-Templates (v0.1.46 i18n Phase 3)
    --
    -- Zielsystem: Qwen 2.5 14B Instruct Q4_K_M über Olares-LiteLLM (oder
    -- jeder OpenAI-kompatible Endpoint). Prompts folgen einheitlicher
    -- Markdown-Struktur (## Aufgabe / Eingabeformat / Regeln / Ausgabe),
    -- Imperativ ohne Anrede, expliziter Hallu-Schutz, `[Sprecher]:`-Format-
    -- Hint. Jedes Schema hat ein führendes `_analyse`-Feld für CoT-vor-JSON.
    --
    -- v0.1.46+: `system_prompts JSONB` enthält Prompts pro UI-Locale
    -- (`de`/`en`/`fr`/`es`/`it`). Die JSON-Schema-Feldnamen bleiben Deutsch
    -- (z. B. `zusammenfassung`, `kernpunkte`) — übersetzt wird nur der
    -- Inhalt, nicht das Schema.
    --
    -- v0.1.48: Legacy `system_prompt TEXT`-Slot in Migration 0013 entfernt.
    -- Seed schreibt nur noch die JSONB-Map.
    --
    -- ON CONFLICT DO UPDATE: idempotent — jeder Init-Container-Run schreibt
    -- die neuesten Defaults. User-Overrides leben in template_customizations
    -- und werden NICHT überschrieben.
    -- ========================================================================
    
    insert into public.templates (
      id, org_id, name, description, category,
      system_prompts, output_schema, few_shot_input, few_shot_output,
      is_system, is_active, version
    )
    values
    -- ============================================================
    -- 1) Allgemeine Besprechung
    -- ============================================================
    (
      '00000000-0000-0000-0000-000000000001',
      null,
      'Allgemeine Besprechung',
      'Standard-Zusammenfassung für interne und externe Meetings.',
      'general',
      jsonb_build_object(
        'de', $de$## Aufgabe
    Erstelle ein strukturiertes Protokoll des folgenden Geschäftsmeetings.
    
    ## Eingabeformat
    Das Transkript zeigt jeden Sprecherbeitrag als `[Sprecher]: Text`. Die Namen sind verlässlich — attributiere Aussagen, Beschlüsse und Aufgaben den jeweiligen Personen.
    
    ## Regeln
    - Verwende ausschließlich Informationen aus dem Transkript.
    - Wenn eine Information nicht im Transkript steht, lass das Feld leer oder setze es auf `null` — erfinde nichts.
    - Schreibe in formellem Deutsch, sachlich und prägnant. Keine Marketing-Floskeln, keine Superlative.
    - Bei Beschlüssen mit Verantwortlichkeit und Frist: nur eintragen, was wörtlich vereinbart wurde.
    
    ## Ausgabe
    Gib ausschließlich ein JSON-Objekt nach dem definierten Schema zurück. Beginne mit dem Feld `_analyse` (2-3 Sätze zu Schwerpunkt und Feldabdeckung), arbeite dann die Hauptfelder ab.$de$,
        'en', $en$## Task
    Produce a structured minutes record of the following business meeting.
    
    ## Input format
    The transcript shows each speaker turn as `[Speaker]: Text`. The names are reliable — attribute statements, decisions and tasks to the respective persons.
    
    ## Rules
    - Use only information that appears in the transcript.
    - If a piece of information is not in the transcript, leave the field empty or set it to `null` — invent nothing.
    - Write in formal business English, factual and concise. No marketing phrases, no superlatives.
    - For decisions with responsibility and deadline: record only what was explicitly agreed.
    
    ## Output
    Return only a JSON object that conforms to the defined schema. Keep the JSON field names exactly as in the schema (they are in German). Start with the `_analyse` field (2-3 sentences on focus and field coverage), then fill the main fields.$en$,
        'fr', $fr$## Tâche
    Rédigez un compte rendu structuré de la réunion d'affaires suivante.
    
    ## Format d'entrée
    La transcription présente chaque intervention sous la forme `[Locuteur] : Texte`. Les noms sont fiables — attribuez les déclarations, décisions et tâches aux personnes concernées.
    
    ## Règles
    - N'utilisez que les informations figurant dans la transcription.
    - Si une information ne figure pas dans la transcription, laissez le champ vide ou mettez `null` — n'inventez rien.
    - Rédigez en français formel, factuel et concis. Pas de formules marketing, pas de superlatifs.
    - Pour les décisions avec responsable et échéance : ne consignez que ce qui a été convenu explicitement.
    
    ## Sortie
    Renvoyez uniquement un objet JSON conforme au schéma défini. Conservez les noms de champs JSON exactement tels qu'ils figurent dans le schéma (ils sont en allemand). Commencez par le champ `_analyse` (2-3 phrases sur le sujet central et la couverture des champs), puis traitez les champs principaux.$fr$,
        'es', $es$## Tarea
    Elabore un acta estructurada de la siguiente reunión de negocios.
    
    ## Formato de entrada
    La transcripción muestra cada intervención como `[Interlocutor]: Texto`. Los nombres son fiables — atribuya las declaraciones, decisiones y tareas a las personas correspondientes.
    
    ## Reglas
    - Utilice únicamente la información contenida en la transcripción.
    - Si un dato no aparece en la transcripción, deje el campo vacío o asígnele `null` — no invente nada.
    - Redacte en español formal, objetivo y conciso. Sin fórmulas de marketing ni superlativos.
    - Para las decisiones con responsable y plazo: registre solo lo acordado de forma expresa.
    
    ## Salida
    Devuelva únicamente un objeto JSON conforme al esquema definido. Mantenga los nombres de los campos JSON exactamente como aparecen en el esquema (están en alemán). Comience por el campo `_analyse` (2-3 frases sobre el enfoque y la cobertura de los campos) y, a continuación, complete los campos principales.$es$,
        'it', $it$## Compito
    Redigere un verbale strutturato della seguente riunione aziendale.
    
    ## Formato di ingresso
    La trascrizione riporta ogni intervento come `[Interlocutore]: Testo`. I nomi sono affidabili — attribuisca dichiarazioni, decisioni e compiti alle persone corrispondenti.
    
    ## Regole
    - Utilizzi esclusivamente le informazioni contenute nella trascrizione.
    - Se un'informazione non è presente nella trascrizione, lasci il campo vuoto o lo imposti su `null` — non inventi nulla.
