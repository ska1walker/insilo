# ============================================================================
# Deployment: Insilo Backend (FastAPI)
#
# Wichtig: Backend nutzt Olares-System-PostgreSQL und -KVRocks.
# Die Variablen .Values.postgres.* und .Values.redis.* werden automatisch
# injiziert, sobald middleware: postgres / redis im OlaresManifest deklariert ist.
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: insilo-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: insilo
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insilo
      component: backend
  template:
    metadata:
      labels:
        app: insilo
        component: backend
    spec:
      initContainers:
        # See deployment-worker.yaml for why this is needed.
        - name: init-chown
          image: busybox:1.36
          command: ['sh', '-c', 'chown -R 1000:1000 /app/cache /app/data']
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: app-cache
              mountPath: /app/cache
            - name: app-data
              mountPath: /app/data

        # Applies schema + seed against the Olares-provided Postgres. Runs
        # with a retry loop so the natural pod-restart cycle covers the
        # window before Olares finishes setting `bytetrade.io/ns-owner` on
        # our namespace (the label that unblocks the cross-NS NetworkPolicy
        # to the DB). Each SQL file is sent as a single asyncpg execute()
        # call = one implicit transaction. Idempotent (CREATE TABLE IF NOT
        # EXISTS, ON CONFLICT DO NOTHING), so re-running on every restart
        # is safe.
        - name: migrate
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          env:
            - name: DB_HOST
              value: "{{ .Values.postgres.host }}"
            - name: DB_PORT
              value: "{{ .Values.postgres.port }}"
            - name: DB_USER
              value: "{{ .Values.postgres.username }}"
            - name: DB_PASSWORD
              value: "{{ .Values.postgres.password }}"
            - name: DB_NAME
              value: "{{ .Values.postgres.databases.insilo }}"
          command:
            - python3
            - -c
            - |
              import asyncio, asyncpg, glob, os, sys

              async def connect_with_retry(attempts: int = 60, delay: float = 5.0):
                  last = None
                  for i in range(1, attempts + 1):
                      try:
                          return await asyncpg.connect(
                              host=os.environ["DB_HOST"],
                              port=int(os.environ["DB_PORT"]),
                              user=os.environ["DB_USER"],
                              password=os.environ["DB_PASSWORD"],
                              database=os.environ["DB_NAME"],
                              timeout=4,
                          )
                      except Exception as exc:
                          last = exc
                          print(f"  attempt {i}/{attempts}: {type(exc).__name__}: {exc}", flush=True)
                          await asyncio.sleep(delay)
                  raise last

              async def main():
                  print("Waiting for Postgres at "
                        f"{os.environ['DB_HOST']}:{os.environ['DB_PORT']} "
                        f"as {os.environ['DB_USER']}...", flush=True)
                  conn = await connect_with_retry()
                  print("Connected.", flush=True)
                  try:
                      for path in sorted(glob.glob("/sql/*.sql")):
                          print(f"Applying {path}...", flush=True)
                          with open(path) as fp:
                              sql = fp.read()
                          await conn.execute(sql)
                          print(f"  ok ({len(sql)} bytes)", flush=True)
                  finally:
                      await conn.close()
                  print("Migrations complete.", flush=True)

              try:
                  asyncio.run(main())
              except Exception as exc:
                  print(f"FAILED: {exc}", flush=True)
                  sys.exit(1)
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
      containers:
        - name: backend
          image: "{{ .Values.images.backend.repository }}:{{ .Values.images.backend.tag }}"
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
          ports:
            - containerPort: 8000
              name: http
          env:
            # ---- PostgreSQL (Olares-System-Middleware) ----------------------
            - name: DB_HOST
              value: "{{ .Values.postgres.host }}"
            - name: DB_PORT
              value: "{{ .Values.postgres.port }}"
            - name: DB_USER
              value: "{{ .Values.postgres.username }}"
            - name: DB_PASSWORD
              value: "{{ .Values.postgres.password }}"
            - name: DB_NAME
              value: "{{ .Values.postgres.databases.insilo }}"

            # ---- KVRocks/Redis (Olares-System-Middleware) -------------------
            - name: REDIS_HOST
              value: "{{ .Values.redis.host }}"
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: REDIS_PASSWORD
              value: "{{ .Values.redis.password }}"
            - name: REDIS_NAMESPACE
              value: "{{ .Values.redis.namespace }}"

            # ---- Interne KI-Service-URLs ------------------------------------
            - name: WHISPER_URL
              value: "http://insilo-whisper:8001"
            # LLM via the shared Olares LiteLLM gateway (OpenAI-compatible).
            # Saves us a 4-GB Ollama image + a GPU slot, and pools the LLM
            # across all kaivo apps on the box.
            - name: LLM_BASE_URL
              value: "http://litellm-svc.litellm-{{ .Values.bfl.username }}.svc.cluster.local/v1"
            - name: LLM_API_KEY
              value: "{{ .Values.litellm.apiKey }}"
            - name: LLM_MODEL
              value: "{{ .Values.litellm.model }}"
            - name: EMBEDDINGS_URL
              value: "http://insilo-embeddings:8002"

            # ---- Storage-Pfade ----------------------------------------------
            - name: APP_DATA_DIR
              value: "{{ .Values.userspace.appData }}"
            - name: APP_CACHE_DIR
              value: "{{ .Values.userspace.appCache }}"

            # ---- Storage-Backend --------------------------------------------
            # "local" → Audio landet auf hostPath unter /app/data/audio/...
            # "minio" wäre der S3-API-Backend, ist auf Olares aber Cross-NS-
            # blockiert (siehe HANDOFF.md §Phase-4c).
            - name: STORAGE_BACKEND
              value: "local"
            - name: STORAGE_LOCAL_PATH
              value: "/app/data/audio"

            # ---- App-Konfiguration ------------------------------------------
            - name: APP_LANG
              value: "{{ .Values.app.language }}"
            - name: APP_TIMEZONE
              value: "{{ .Values.app.defaultTimezone }}"
            - name: AUDIO_RETENTION_DAYS
              value: "{{ .Values.app.audioRetentionDays }}"
            - name: MAX_UPLOAD_MB
              value: "{{ .Values.app.maxUploadSizeMb }}"

            # ---- Olares-Kontext (für User-Identifikation) -------------------
            - name: OLARES_USER
              value: "{{ .Values.bfl.username }}"
            - name: OLARES_ZONE
              value: "{{ .Values.user.zone }}"

          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-cache
              mountPath: /app/cache

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: app-data
          hostPath:
            path: {{ .Values.userspace.appData }}
            type: DirectoryOrCreate
        - name: app-cache
          hostPath:
            path: {{ .Values.userspace.appCache }}
            type: DirectoryOrCreate
        - name: sql
          configMap:
            name: insilo-migrations
